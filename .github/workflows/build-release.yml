name: Build release packages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mwan3
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq wget zstd gcc make

      - name: Resolve version
        id: ver
        run: |
          rel="2.12.1-r5"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            rel="${GITHUB_REF_NAME#v}"
          fi
          echo "release=${rel}" >> "$GITHUB_OUTPUT"
          echo "pkg_release=${rel##*-r}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: bash tests/run_tests.sh

      - name: Build IPK (x86_64)
        env:
          PKG_RELEASE: ${{ steps.ver.outputs.pkg_release }}
        run: bash scripts/build-ipk-mkpkg.sh

      - name: Build APK (OpenWrt 25.12+)
        env:
          PKG_RELEASE: ${{ steps.ver.outputs.pkg_release }}
        run: bash scripts/build-apk-mkpkg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mwan3-packages
          path: dist/*
          retention-days: 90

      - name: Attach packages to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          overwrite_files: true
